# ParakhAI Edge Deployment Configuration
system:
  device: "cpu" # Default to cpu on edge unless mps/gpu available
  log_level: "INFO"
  seed: 42

model:
  type: "patchcore"
  backbone: "wideresnet50" # Could switch to dinov2 for higher representation but slower
  coreset_ratio: 0.01

inference:
  illum_norm_method: "clahe"    # lightweight CLAHE; no Retinex on edge hardware
  illum_norm_clip_limit: 2.0
  illum_norm_tile_grid: [8, 8]
  streaming:
    display_fps: 15
    inference_fps: 5
    motion_threshold: 0.02
  heatmap:
    warn_threshold: 0.5
    fail_threshold: 0.75
    alpha: 0.4

storage:
  model_dir: "data/models"
  db_path: "data/parakh.db"

calibration:
  augmentation_enabled: false   # skip augmentation on edge to save calibration time
  augmentation_multiplier: 1
